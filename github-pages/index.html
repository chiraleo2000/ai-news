<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI News Daily — Cyberpunk Briefing</title>
  <link rel="stylesheet" href="assets/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Scan lines overlay -->
  <div class="scanlines"></div>

  <!-- Header -->
  <header class="site-header">
    <div class="container">
      <div class="header-brand">
        <div class="logo-icon">⚡</div>
        <div class="header-text">
          <h1 class="site-title">AI NEWS DAILY</h1>
          <p class="site-subtitle">CYBERPUNK INTELLIGENCE BRIEFING</p>
        </div>
      </div>
      <div class="header-meta">
        <span class="date-display" id="headerDate">Loading...</span>
        <span class="article-count" id="headerCount">— articles</span>
      </div>
    </div>
  </header>

  <!-- Navigation Tabs (4 Topics) -->
  <nav class="topic-nav">
    <div class="container">
      <button class="topic-tab active" data-topic="all">
        <span class="tab-icon">◈</span> ALL FEEDS
      </button>
      <button class="topic-tab" data-topic="ai-trends">
        <span class="tab-icon">🧠</span> AI TRENDS
      </button>
      <button class="topic-tab" data-topic="tech-trends">
        <span class="tab-icon">⚙️</span> TECH TRENDS
      </button>
      <button class="topic-tab" data-topic="thailand">
        <span class="tab-icon">🇹🇭</span> THAILAND AI & TECH
      </button>
      <button class="topic-tab" data-topic="global">
        <span class="tab-icon">🌐</span> GLOBAL AI & TECH
      </button>
    </div>
  </nav>

  <!-- Stats Bar -->
  <section class="stats-bar">
    <div class="container">
      <div class="stat-item">
        <span class="stat-value" id="statTotal">0</span>
        <span class="stat-label">TOTAL</span>
      </div>
      <div class="stat-item">
        <span class="stat-value" id="statAI">0</span>
        <span class="stat-label">AI TRENDS</span>
      </div>
      <div class="stat-item">
        <span class="stat-value" id="statTech">0</span>
        <span class="stat-label">TECH</span>
      </div>
      <div class="stat-item">
        <span class="stat-value" id="statThai">0</span>
        <span class="stat-label">THAILAND</span>
      </div>
      <div class="stat-item">
        <span class="stat-value" id="statGlobal">0</span>
        <span class="stat-label">GLOBAL</span>
      </div>
    </div>
  </section>

  <!-- Main Content -->
  <main class="main-content">
    <div class="container">
      <!-- Date Selector -->
      <div class="date-selector">
        <label for="dateSelect">ARCHIVE:</label>
        <select id="dateSelect"></select>
      </div>

      <!-- Articles Grid -->
      <div class="articles-grid" id="articlesGrid">
        <div class="loading-state">
          <div class="loader"></div>
          <p>INITIALIZING DATA STREAM...</p>
        </div>
      </div>
    </div>
  </main>

  <!-- Article Modal -->
  <div class="modal-overlay" id="articleModal">
    <div class="modal-content">
      <button class="modal-close" id="modalClose">✕</button>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="container">
      <p>AI NEWS DAILY — Automated Intelligence Briefing System</p>
      <p class="footer-sub">Data pipeline v1.0 | Cyberpunk Light Theme</p>
    </div>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
